<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <!-- Steel beam gradient - brushed metal look -->
    <linearGradient id="beam-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F8F8F8"/>
      <stop offset="30%"  stop-color="#FFFFFF"/>
      <stop offset="60%"  stop-color="#D8D8D8"/>
      <stop offset="100%" stop-color="#ECECEC"/>
    </linearGradient>
    <linearGradient id="beam-web" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#E0E0E0"/>
      <stop offset="25%"  stop-color="#FAFAFA"/>
      <stop offset="50%"  stop-color="#FFFFFF"/>
      <stop offset="75%"  stop-color="#E8E8E8"/>
      <stop offset="100%" stop-color="#D4D4D4"/>
    </linearGradient>
    <!-- Subtle top-shine overlay -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Shadow under beam -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <!-- Edge glow on flanges -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- App icon background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Top glass sheen -->
  <rect width="512" height="280" rx="108" fill="url(#shine)"/>

  <!-- ── I-BEAM (structural steel cross-section) ── -->
  <g filter="url(#shadow)">
    <!-- Top flange -->
    <rect x="112" y="130" width="288" height="56" rx="11" fill="url(#beam-top)"/>
    <!-- Web (vertical middle) -->
    <rect x="224" y="186" width="64" height="140" fill="url(#beam-web)"/>
    <!-- Bottom flange -->
    <rect x="112" y="326" width="288" height="56" rx="11" fill="url(#beam-top)"/>
  </g>

  <!-- Thin bright highlight edge on top of flanges (brushed metal edge) -->
  <rect x="112" y="130" width="288" height="4" rx="4" fill="white" opacity="0.55"/>
  <rect x="112" y="326" width="288" height="4" rx="4" fill="white" opacity="0.4"/>

  <!-- Subtle flange-web fillet shadows (depth lines) -->
  <rect x="224" y="185" width="64" height="5" fill="#A0A0A0" opacity="0.4"/>
  <rect x="224" y="322" width="64" height="5" fill="#A0A0A0" opacity="0.3"/>

  <!-- POS receipt accent — bottom right, subtle -->
  <g opacity="0.22">
    <rect x="318" y="404" width="66" height="58" rx="9" fill="white"/>
    <rect x="328" y="416" width="46" height="5" rx="2.5" fill="#0A0A0A"/>
    <rect x="328" y="427" width="34" height="5" rx="2.5" fill="#0A0A0A"/>
    <rect x="328" y="438" width="40" height="5" rx="2.5" fill="#0A0A0A"/>
    <!-- Receipt tooth -->
    <polygon points="318,462 327,454 336,462 345,454 354,462 363,454 372,462 381,454 384,462 384,462" fill="#0A0A0A" opacity="0.3"/>
  </g>
</svg>
